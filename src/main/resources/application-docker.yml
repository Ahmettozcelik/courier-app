server:
  port: 8081

spring:
  data:
    redis:
      host: redis
      port: 6379
      lettuce:
        pool:
          max-active: 16     # Maksimum aktif bağlantı sayısı
          max-idle: 8        # Boşta bekleyebilecek maksimum bağlantı
          min-idle: 4        # Uygulama açılır açılmaz hazırda bekleyecek minimum bağlantı (Kritik Ayar!)
          max-wait: 2000ms   # Bağlantı sırası beklemek için maksimum süre
    mongodb:
      host: mongodb
      port: 27017
      database: tracking

  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      auto-offset-reset: earliest
