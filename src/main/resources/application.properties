spring.application.name=tracking
server.port=8081

# =======================
# KAFKA (DOCKER SAFE)
# =======================
spring.kafka.bootstrap-servers=kafka:29092

# =======================
# CONSUMER
# =======================
spring.kafka.consumer.group-id=tracking-group

spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.default.type=com.example.tracking.model.CourierLocationUpdatedEvent

# ? IMPORTANT: trusted packages (DOCKER SAFE)
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.tracking.model

spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.auto-offset-reset=earliest


# =======================
# PRODUCER
# =======================
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

spring.kafka.producer.properties.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.retries=3


# =======================
# DATABASE (DOCKER NETWORK)
# =======================
spring.data.mongodb.host=mongodb
spring.data.mongodb.port=27017
spring.data.mongodb.database=tracking

spring.redis.host=redis
spring.redis.port=6379
spring.redis.timeout=2000


# =======================
# LOGGING
# =======================
logging.level.org.springframework.kafka=INFO
logging.pattern.console=%d{HH:mm:ss} [%X{traceId}] %-5level %logger - %msg%n
logging.level.org.springframework.boot.context.config=TRACE